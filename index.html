<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacPhail Family Genealogy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
  :root {
    --cream: #f2f5f2;
    --parchment: #dce8dc;
    --ink: #1a2e1a;
    --green-dark: #1e3d1a;
    --green: #2d5a27;
    --green-mid: #3d7a35;
    --green-light: #5a9e50;
    --green-pale: #e8f0e8;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'Inter',system-ui,sans-serif; color:var(--ink); min-height:100vh; font-size:14px; }
  .layout { display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar { width:280px; flex-shrink:0; background:var(--green-dark); color:#e8f0e8; display:flex; flex-direction:column; padding:1.25rem 0.9rem; gap:0.9rem; }
  .sidebar h2 { font-family:'Lora',Georgia,serif; font-size:1rem; font-weight:600; color:#a8d4a0; padding-bottom:0.5rem; border-bottom:1px solid rgba(168,212,160,0.25); letter-spacing:0.01em; }
  .search-box { width:100%; padding:0.45rem 0.7rem; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:6px; color:#e8f0e8; font-family:'Inter',sans-serif; font-size:0.8rem; outline:none; }
  .search-box::placeholder { color:rgba(232,240,232,0.35); }
  .search-box:focus { border-color:#a8d4a0; }
  .person-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
  .person-item { padding:0.4rem 0.55rem; border-radius:5px; cursor:pointer; font-size:0.78rem; line-height:1.35; transition:background 0.12s; }
  .person-item:hover { background:rgba(168,212,160,0.12); }
  .person-item.active { background:rgba(168,212,160,0.22); }
  .person-item .pid { display:block; font-size:0.65rem; color:#7db875; font-family:'Inter',monospace; font-weight:500; letter-spacing:0.02em; }

  /* Main */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  header { background:white; border-bottom:2px solid var(--green); padding:0.9rem 1.4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
  .header-title a { text-decoration:none; color:inherit; }
  .header-title a:hover h1 { color:var(--green-mid); }
  .header-title h1 { font-family:'Lora',Georgia,serif; font-size:1.35rem; font-weight:600; color:var(--green-dark); transition:color 0.15s; letter-spacing:-0.01em; }
  .header-title p { font-size:0.75rem; color:var(--green-mid); margin-top:0.1rem; font-weight:400; }

  /* Back button — mobile only */
  .back-btn { display:none; align-items:center; gap:0.25rem; background:none; border:none; color:var(--green-dark); font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; padding:0.3rem 0.1rem; flex-shrink:0; }

  /* Chat button in sidebar — mobile only */
  .sidebar-chat-btn { display:none; width:100%; padding:0.65rem; background:var(--green); color:white; border:none; border-radius:6px; font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:600; cursor:pointer; }

  /* Single ask button */
  .ask-btn { padding:0.55rem 1.5rem; border:none; background:var(--green); color:white; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; border-radius:6px; transition:background 0.15s; letter-spacing:0.01em; white-space:nowrap; }
  .ask-btn:hover { background:var(--green-mid); }

  /* Panels */
  .panel { display:none; flex:1; overflow-y:auto; padding:1.25rem; }
  .panel.active { display:block; }

  /* Person card */
  .person-card { background:white; border:1px solid var(--parchment); border-radius:8px; padding:1.4rem; max-width:700px; box-shadow:0 1px 6px rgba(30,61,26,0.07); }
  .person-card h2 { font-family:'Lora',Georgia,serif; font-size:1.4rem; font-weight:600; color:var(--green-dark); margin-bottom:0.15rem; }
  .person-card .mp-id { font-size:0.72rem; color:var(--green-mid); font-weight:500; margin-bottom:1rem; font-family:'Inter',monospace; letter-spacing:0.03em; }
  .info-grid { display:grid; grid-template-columns:130px 1fr; gap:0.3rem 0.9rem; margin-bottom:1rem; font-size:0.84rem; }
  .info-grid .label { color:var(--green); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.04em; align-self:start; padding-top:0.1rem; }
  .section-title { font-size:0.72rem; font-weight:600; color:var(--green); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--parchment); padding-bottom:0.3rem; margin:1rem 0 0.5rem; }
  .relation-list { display:flex; flex-direction:column; gap:0.25rem; }
  .relation-link { display:inline-block; padding:0.28rem 0.65rem; background:var(--green-pale); border:1px solid rgba(45,90,39,0.2); border-radius:5px; color:var(--green-dark); font-size:0.8rem; cursor:pointer; text-decoration:none; transition:all 0.12s; font-weight:500; }
  .relation-link:hover { background:var(--green); color:white; border-color:var(--green); }
  .notes-box { background:var(--green-pale); border-left:3px solid var(--green); padding:0.65rem 0.9rem; font-size:0.82rem; margin-top:0.5rem; border-radius:0 5px 5px 0; line-height:1.55; color:var(--ink); }
  .empty-state { display:flex; align-items:center; justify-content:center; height:200px; color:var(--green-mid); opacity:0.55; font-size:0.88rem; text-align:center; padding:2rem; }

  /* Chat */
  .chat-wrap { max-width:700px; display:flex; flex-direction:column; height:calc(100vh - 112px); }
  .messages { flex:1; overflow-y:auto; background:white; border:1px solid var(--parchment); border-radius:8px; padding:1rem; display:flex; flex-direction:column; gap:0.75rem; }
  .msg { display:flex; gap:0.5rem; }
  .msg.user { flex-direction:row-reverse; }
  .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.65rem; font-weight:700; flex-shrink:0; letter-spacing:0.02em; }
  .avatar.bot { background:var(--green); color:white; }
  .avatar.user { background:var(--green-light); color:white; }
  .bubble { max-width:78%; padding:0.55rem 0.8rem; border-radius:8px; font-size:0.84rem; line-height:1.6; }
  .bubble.bot { background:var(--green-pale); border:1px solid rgba(45,90,39,0.15); color:var(--ink); }
  .bubble.user { background:var(--green); color:white; }
  .bubble p + p { margin-top:0.35rem; }
  .suggestions { display:flex; flex-wrap:wrap; gap:0.35rem; margin-top:0.55rem; }
  .sug-btn { padding:0.22rem 0.6rem; background:white; border:1px solid var(--green); color:var(--green-dark); font-family:'Inter',sans-serif; font-size:0.72rem; font-weight:500; border-radius:4px; cursor:pointer; transition:all 0.12s; }
  .sug-btn:hover { background:var(--green); color:white; }
  .input-row { display:flex; gap:0.45rem; margin-top:0.55rem; }
  .chat-input { flex:1; padding:0.55rem 0.8rem; border:1px solid var(--parchment); border-radius:6px; font-family:'Inter',sans-serif; font-size:0.84rem; color:var(--ink); background:white; outline:none; }
  .chat-input:focus { border-color:var(--green); box-shadow:0 0 0 2px rgba(45,90,39,0.1); }
  .send-btn { padding:0.55rem 1.1rem; background:var(--green); color:white; border:none; border-radius:6px; font-family:'Inter',sans-serif; font-size:0.84rem; font-weight:600; cursor:pointer; transition:background 0.12s; }
  .send-btn:hover { background:var(--green-mid); }
  .send-btn:disabled { opacity:0.45; cursor:not-allowed; }
  .thinking-dots { display:flex; gap:4px; padding:3px 0; }
  .dot { width:6px; height:6px; background:var(--green-mid); border-radius:50%; animation:bounce 1.1s infinite; }
  .dot:nth-child(2) { animation-delay:0.18s; }
  .dot:nth-child(3) { animation-delay:0.36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-5px);opacity:1} }
  .mp-link { color:var(--green-mid); text-decoration:underline; cursor:pointer; font-family:'Inter',monospace; font-size:0.78rem; font-weight:600; }
  .mp-link:hover { color:var(--green-dark); }

  /* ── Responsive ── */
  @media (max-width:640px) {
    .sidebar {
      position:fixed; inset:0; z-index:20;
      width:100%; overflow-y:auto;
    }
    .sidebar.hidden { display:none; }
    .main {
      position:fixed; inset:0; z-index:20;
      display:none; flex-direction:column;
      background:var(--cream);
    }
    .main.visible { display:flex; }
    .back-btn { display:flex; }
    .header-title h1 { font-size:1.05rem; }
    .header-title p { display:none; }
    .ask-btn { font-size:0.82rem; padding:0.45rem 0.9rem; }
    .panel { padding:0.85rem; }
    .person-card { padding:1rem; }
    .info-grid { grid-template-columns:80px 1fr; }
    .chat-wrap { height:calc(100vh - 95px); }
    .sidebar-chat-btn { display:block; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h2>Family Members</h2>
    <button class="sidebar-chat-btn" onclick="openChat()">&#8592; Back to Chat</button>
    <input class="search-box" id="searchBox" placeholder="Search by name..." oninput="filterList(this.value)">
    <div class="person-list" id="personList"></div>
  </aside>
  <div class="main" id="main">
    <header>
      <button class="back-btn" onclick="goBack()">&#8592; List</button>
      <div class="header-title">
        <a href="." onclick="location.reload();return false;">
          <h1>MacPhail Family Genealogy</h1>
        </a>
        <p>Granger MacPhail (MP114154) &amp; Christy MacEachern &middot; Argyle Shore, PEI</p>
      </div>
      <button class="ask-btn" onclick="openChat()">Ask a Question</button>
    </header>
    <div class="panel active" id="browsePanel">
      <div id="personDetail"><div class="empty-state">Select a family member from the sidebar, or click Ask a Question to query the records.</div></div>
    </div>
    <div class="panel" id="chatPanel">
      <div class="chat-wrap">
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about the MacPhail family..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Ask</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var PEOPLE = [];
var INDEX = {};
var chatHistory = [];
var WORKER_URL = 'https://quiet-math-cd1dmacphail-gemini.dfbowers.workers.dev';

function isMobile() { return window.innerWidth <= 640; }

function showMain() {
  if (isMobile()) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('main').classList.add('visible');
  }
}

function goBack() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('main').classList.remove('visible');
}

async function boot() {
  var res = await fetch('data/family.json');
  var data = await res.json();
  PEOPLE = data.people;
  PEOPLE.forEach(function(p) { INDEX[p.id] = p; });
  renderList(PEOPLE);
  initChat();
  // On mobile, default to chat view
  if (isMobile()) {
    document.getElementById('browsePanel').classList.remove('active');
    document.getElementById('chatPanel').classList.add('active');
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('main').classList.add('visible');
  }
}

function renderList(people) {
  var el = document.getElementById('personList');
  el.innerHTML = '';
  people.slice(0,300).forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'person-item';
    div.dataset.id = p.id;
    div.innerHTML = '<span class="pid">'+p.id+'</span>'+(p.known_as?p.known_as+' &mdash; ':'')+p.name;
    div.onclick = function() { showPerson(p.id); };
    el.appendChild(div);
  });
}

function filterList(q) {
  q = q.toLowerCase();
  var filtered = q ? PEOPLE.filter(function(p) {
    return p.name.toLowerCase().includes(q)||(p.known_as&&p.known_as.toLowerCase().includes(q))||p.id.toLowerCase().includes(q);
  }) : PEOPLE;
  renderList(filtered);
}

function openChat() {
  document.getElementById('browsePanel').classList.remove('active');
  document.getElementById('chatPanel').classList.add('active');
  showMain();
  document.getElementById('chatInput').focus();
}

function showTab(name) {
  var isBrowse = name === 'browse';
  document.getElementById('browsePanel').classList.toggle('active', isBrowse);
  document.getElementById('chatPanel').classList.toggle('active', !isBrowse);
}

function showPerson(id) {
  var p = INDEX[id];
  if (!p) return;
  document.querySelectorAll('.person-item').forEach(function(el) { el.classList.toggle('active', el.dataset.id === id); });
  showTab('browse');
  showMain();
  var father = p.father ? INDEX[p.father] : null;
  var children = (p.children||[]).map(function(cid){return INDEX[cid];}).filter(Boolean);
  var siblings = father ? (father.children||[]).map(function(cid){return INDEX[cid];}).filter(function(c){return c&&c.id!==id;}) : [];
  var html = '<div class="person-card">';
  html += '<h2>'+(p.known_as?p.known_as+' ':'')+p.name+'</h2>';
  html += '<div class="mp-id">'+p.id+'</div>';
  html += '<div class="info-grid">';
  if (p.born) html += '<span class="label">Born</span><span>'+p.born+(p.birthplace?' &mdash; '+p.birthplace:'')+'</span>';
  if (p.died) html += '<span class="label">Died</span><span>'+p.died+(p.deathplace?' &mdash; '+p.deathplace:'')+'</span>';
  if (p.buried) html += '<span class="label">Buried</span><span>'+p.buried+'</span>';
  if (p.occupation) html += '<span class="label">Occupation</span><span>'+p.occupation+'</span>';
  if (p.residence) html += '<span class="label">Lives</span><span>'+p.residence+'</span>';
  html += '</div>';
  if (father||p.father_name) {
    html += '<div class="section-title">Parents</div><div class="relation-list">';
    if (father) html += '<span class="relation-link" onclick="showPerson(\''+father.id+'\')">' +father.name+' &middot; '+father.id+'</span>';
    else if (p.father_name) html += '<span>'+p.father_name+'</span>';
    if (p.mother_name) html += '<span>'+p.mother_name+'</span>';
    html += '</div>';
  }
  if (p.spouses&&p.spouses.length) {
    html += '<div class="section-title">Spouse'+(p.spouses.length>1?'s':'')+'</div><div class="relation-list">';
    p.spouses.forEach(function(s) {
      if (s.id&&INDEX[s.id]) {
        html += '<span class="relation-link" onclick="showPerson(\''+s.id+'\')">' +s.name+(s.married?' &mdash; married '+s.married:'')+'</span>';
      } else {
        html += '<span style="font-size:0.82rem;padding:0.25rem 0;display:block;color:var(--ink)">'+s.name+(s.married?' &mdash; married '+s.married:'')+'</span>';
      }
    });
    html += '</div>';
  }
  if (children.length) {
    html += '<div class="section-title">Children ('+children.length+')</div><div class="relation-list">';
    children.forEach(function(c) {
      html += '<span class="relation-link" onclick="showPerson(\''+c.id+'\')">' +c.name+(c.born?' &middot; b.'+c.born:'')+'</span>';
    });
    html += '</div>';
  }
  if (siblings.length) {
    html += '<div class="section-title">Siblings ('+siblings.length+')</div><div class="relation-list">';
    siblings.forEach(function(s) {
      html += '<span class="relation-link" onclick="showPerson(\''+s.id+'\')">' +s.name+(s.born?' &middot; b.'+s.born:'')+'</span>';
    });
    html += '</div>';
  }
  if (p.notes) html += '<div class="section-title">Notes</div><div class="notes-box">'+p.notes+'</div>';
  html += '</div>';
  document.getElementById('personDetail').innerHTML = html;
}

function personToText(p) {
  var parts = [p.id+': '+p.name+(p.known_as?' ('+p.known_as+')':'')];
  if (p.born) parts.push('born '+p.born+(p.birthplace?' at '+p.birthplace:''));
  if (p.died) parts.push('died '+p.died+(p.deathplace?' at '+p.deathplace:''));
  if (p.buried) parts.push('buried '+p.buried);
  if (p.occupation) parts.push('occupation: '+p.occupation);
  if (p.residence) parts.push('lives at '+p.residence);
  var fo = p.father ? INDEX[p.father] : null;
  if (fo) parts.push('father: '+fo.name+' ('+p.father+')');
  else if (p.father_name) parts.push('father: '+p.father_name);
  if (p.mother_name) parts.push('mother: '+p.mother_name);
  if (p.spouses&&p.spouses.length) parts.push('spouse(s): '+p.spouses.map(function(s){return s.name+(s.married?' m.'+s.married:'');}).join('; '));
  if (p.children&&p.children.length) {
    var cn = p.children.map(function(cid){ var c=INDEX[cid]; return c?c.name+'('+cid+')':cid; });
    parts.push('children: '+cn.join(', '));
  }
  if (p.notes) parts.push('notes: '+p.notes.slice(0,80));
  return parts.join('. ');
}

function getRelevantPeople(message) {
  var msg = message.toLowerCase();
  var relevant = {};
  PEOPLE.forEach(function(p) {
    var nl = p.name.toLowerCase();
    var al = p.known_as ? p.known_as.toLowerCase() : '';
    if (msg.includes(nl)||(al&&msg.includes(al))||msg.includes(p.id.toLowerCase())) relevant[p.id]=true;
    nl.split(' ').forEach(function(w){ if(w.length>3&&msg.includes(w)) relevant[p.id]=true; });
  });
  Object.keys(relevant).slice().forEach(function(id) {
    var p = INDEX[id]; if(!p) return;
    if (p.father&&INDEX[p.father]) {
      relevant[p.father]=true;
      (INDEX[p.father].children||[]).forEach(function(cid){ if(INDEX[cid]) relevant[cid]=true; });
    }
    (p.children||[]).forEach(function(cid){ if(INDEX[cid]) relevant[cid]=true; });
    if (p.father&&INDEX[p.father]) {
      var gid=INDEX[p.father].father;
      if(gid&&INDEX[gid]) {
        relevant[gid]=true;
        (INDEX[gid].children||[]).forEach(function(uid){
          if(INDEX[uid]) {
            relevant[uid]=true;
            (INDEX[uid].children||[]).forEach(function(cid){ if(INDEX[cid]) relevant[cid]=true; });
          }
        });
      }
    }
  });
  var ids = Object.keys(relevant);
  if (ids.length===0) return PEOPLE.map(function(p){ return p.id+'|'+p.name+(p.known_as?'('+p.known_as+')':'')+'|'+(p.born?p.born.slice(0,4):'')+'|'+(p.father&&INDEX[p.father]?INDEX[p.father].name:'')+'|'+(p.children&&p.children.length?p.children.length+' children':''); }).join('\n');
  return ids.map(function(id){ return personToText(INDEX[id]); }).join('\n\n');
}

function initChat() {
  addBotMessage(
    'Welcome to the MacPhail family records. I have detailed genealogy data for Granger MacPhail (MP114154) and Christy MacEachern of Argyle Shore, PEI \u2014 13 children and all their descendants.\n\nTell me your name and who you are descended from, and I can answer questions about births, deaths, occupations, marriages, and family relationships.',
    ['Who was Granger MacPhail?','Tell me about Frederick MacPhail','Who were Jack and Rotha\'s children?','What was Sterling MacPhail\'s occupation?','Tell me about Midi MacPhail\'s family']
  );
}

function addBotMessage(text, suggestions) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  var bh = text.split('\n').filter(function(l){return l.trim();}).map(function(l){
    l = l.replace(/\b(MP[\w\d]+)\b/g,function(m){ return INDEX[m]?'<span class="mp-link" onclick="showPerson(\''+m+'\')" title="View '+INDEX[m].name+'">' +m+'</span>':m; });
    return '<p>'+l+'</p>';
  }).join('');
  if (suggestions) bh += '<div class="suggestions">'+suggestions.map(function(s){ return '<button class="sug-btn" onclick="sendMessage(\''+s.replace(/'/g,"\\'")+'\')">' +s+'</button>'; }).join('')+'</div>';
  div.innerHTML = '<div class="avatar bot">MP</div><div class="bubble bot">'+bh+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar user">You</div><div class="bubble user"><p>'+text+'</p></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg'; div.id = 'thinking';
  div.innerHTML = '<div class="avatar bot">MP</div><div class="bubble bot"><div class="thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage(text) {
  var input = document.getElementById('chatInput');
  var userText = text||input.value.trim();
  if (!userText) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addUserMessage(userText);
  var allText = chatHistory.map(function(h){return h.parts[0].text;}).join(' ')+' '+userText;
  var relevantData = getRelevantPeople(allText);
  chatHistory.push({role:'user',parts:[{text:userText}]});
  showThinking();
  var sys = 'You are a warm, knowledgeable genealogy assistant for the MacPhail family history book, Chapter 10.\n\nThe family is from Argyle Shore, Prince Edward Island, Canada. The root couple is GRANGER MacPHAIL (MP114154) and CHRISTY MacEachern.\n\nRules:\n- Be warm and conversational, use first names naturally\n- Always complete your full answer \u2014 never cut off mid-sentence or mid-list\n- For relationship questions (cousins, aunts, uncles) explain your reasoning step by step\n- First cousins = children of your parent\'s siblings\n- Always include the MP ID number after each person\'s name so they can click to view their profile\nThe data uses a "father" field as a generic parent link \u2014 always check if that parent is male or female before saying "father" or "mother". If the parent is female, say "mother" instead.\nIf information is not in the data provided, say so honestly\n\nRELEVANT FAMILY DATA:\n'+relevantData;
  fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:chatHistory,generationConfig:{maxOutputTokens:2048,temperature:0.3}})
  }).then(function(res){
    return res.json().then(function(data){
      var t=document.getElementById('thinking'); if(t) t.remove();
      if(!res.ok){ addBotMessage('API error ('+res.status+'): '+(data&&data.error&&data.error.message?data.error.message:JSON.stringify(data))); document.getElementById('sendBtn').disabled=false; return; }
      var reply=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]?data.candidates[0].content.parts[0].text:'No response received.';
      chatHistory.push({role:'model',parts:[{text:reply}]});
      addBotMessage(reply);
      document.getElementById('sendBtn').disabled=false;
    });
  }).catch(function(err){
    var t=document.getElementById('thinking'); if(t) t.remove();
    addBotMessage('Connection error: '+err.message);
    document.getElementById('sendBtn').disabled=false;
  });
}

boot();
</script>
</body>
</html>

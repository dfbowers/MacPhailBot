<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacPhail Family Genealogy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap');

  :root {
    --cream: #f5f0e8;
    --parchment: #ede5d0;
    --ink: #2c1f0e;
    --brown: #6b4a2a;
    --gold: #b8860b;
    --rust: #8b3a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Layout ── */
  .layout { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--ink);
    color: var(--cream);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1rem;
    gap: 1rem;
  }

  .sidebar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(184,134,11,0.3);
  }

  .search-box {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    color: var(--cream);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    outline: none;
  }

  .search-box::placeholder { color: rgba(245,240,232,0.4); }
  .search-box:focus { border-color: var(--gold); }

  .person-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .person-item {
    padding: 0.45rem 0.6rem;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1.3;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .person-item:hover { background: rgba(184,134,11,0.15); }
  .person-item.active { background: rgba(184,134,11,0.25); border-color: rgba(184,134,11,0.4); }

  .person-item .pid {
    display: block;
    font-size: 0.68rem;
    color: var(--gold);
    opacity: 0.8;
    font-family: monospace;
  }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 2px solid var(--gold);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--ink);
  }

  .header-title p {
    font-style: italic;
    font-size: 0.82rem;
    color: var(--brown);
  }

  .tab-bar {
    display: flex;
    gap: 0.25rem;
  }

  .tab {
    padding: 0.4rem 1rem;
    border: 1px solid var(--parchment);
    background: var(--parchment);
    color: var(--brown);
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }

  .tab.active, .tab:hover {
    background: var(--brown);
    color: var(--cream);
    border-color: var(--brown);
  }

  /* ── Content panels ── */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 1.5rem; }
  .panel.active { display: block; }

  /* ── Person card ── */
  .person-card {
    background: white;
    border: 1px solid var(--parchment);
    border-radius: 4px;
    padding: 1.5rem;
    max-width: 720px;
    box-shadow: 0 2px 8px rgba(44,31,14,0.08);
  }

  .person-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    margin-bottom: 0.2rem;
  }

  .person-card .mp-id {
    font-family: monospace;
    font-size: 0.78rem;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 0.35rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.88rem;
  }

  .info-grid .label { color: var(--brown); font-weight: 600; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--brown);
    border-bottom: 1px solid var(--parchment);
    padding-bottom: 0.3rem;
    margin: 1rem 0 0.5rem;
  }

  .relation-list { display: flex; flex-direction: column; gap: 0.3rem; }

  .relation-link {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    background: var(--parchment);
    border: 1px solid rgba(107,74,42,0.2);
    border-radius: 3px;
    color: var(--brown);
    font-size: 0.84rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }

  .relation-link:hover { background: var(--brown); color: var(--cream); }

  .notes-box {
    background: var(--parchment);
    border-left: 3px solid var(--gold);
    padding: 0.75rem 1rem;
    font-size: 0.84rem;
    font-style: italic;
    margin-top: 0.5rem;
    border-radius: 0 3px 3px 0;
  }

  /* ── Chat panel ── */
  .chat-wrap {
    max-width: 720px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
  }

  .api-key-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
    padding: 0.6rem 0.8rem;
    background: white;
    border: 1px solid var(--parchment);
    border-radius: 4px;
    font-size: 0.8rem;
  }

  .api-key-bar label { color: var(--brown); white-space: nowrap; font-weight: 600; }

  .api-key-bar input {
    flex: 1;
    padding: 0.3rem 0.5rem;
    border: 1px solid var(--parchment);
    border-radius: 3px;
    font-size: 0.8rem;
    font-family: monospace;
    outline: none;
  }

  .api-key-bar input:focus { border-color: var(--gold); }

  .api-key-bar button {
    padding: 0.3rem 0.8rem;
    background: var(--brown);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    font-size: 0.78rem;
    cursor: pointer;
  }

  .api-status {
    font-size: 0.72rem;
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    white-space: nowrap;
  }

  .api-status.set { background: #d4edda; color: #155724; }
  .api-status.unset { background: #fff3cd; color: #856404; }

  .messages {
    flex: 1;
    overflow-y: auto;
    background: white;
    border: 1px solid var(--parchment);
    border-radius: 4px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .msg { display: flex; gap: 0.6rem; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }

  .avatar.bot { background: var(--brown); color: var(--cream); }
  .avatar.user { background: var(--gold); color: white; }

  .bubble {
    max-width: 78%;
    padding: 0.6rem 0.85rem;
    border-radius: 4px;
    font-size: 0.86rem;
    line-height: 1.65;
  }

  .bubble.bot {
    background: var(--parchment);
    border: 1px solid rgba(184,134,11,0.2);
  }

  .bubble.user {
    background: var(--brown);
    color: var(--cream);
  }

  .bubble p + p { margin-top: 0.4rem; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }

  .sug-btn {
    padding: 0.25rem 0.6rem;
    background: white;
    border: 1px solid var(--gold);
    color: var(--brown);
    font-family: 'Source Serif 4', serif;
    font-size: 0.74rem;
    border-radius: 2px;
    cursor: pointer;
  }

  .sug-btn:hover { background: var(--gold); color: white; }

  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.6rem;
  }

  .chat-input {
    flex: 1;
    padding: 0.6rem 0.85rem;
    border: 1px solid var(--parchment);
    border-radius: 4px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.86rem;
    color: var(--ink);
    background: white;
    outline: none;
  }

  .chat-input:focus { border-color: var(--gold); }

  .send-btn {
    padding: 0.6rem 1.1rem;
    background: var(--brown);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 0.86rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .send-btn:hover { background: var(--rust); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .thinking-dots { display: flex; gap: 4px; padding: 4px 0; }
  .dot {
    width: 6px; height: 6px;
    background: var(--brown);
    border-radius: 50%;
    animation: bounce 1.1s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--brown);
    opacity: 0.5;
    font-style: italic;
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
  }

  @media (max-width: 640px) {
    .sidebar { width: 220px; }
    .layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: 220px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Family Members</h2>
    <input class="search-box" id="searchBox" placeholder="Search by name..." oninput="filterList(this.value)">
    <div class="person-list" id="personList"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header>
      <div class="header-title">
        <h1>MacPhail Family Genealogy</h1>
        <p>Granger MacPhail (MP114154) &amp; Christy MacEachern · Argyle Shore, PEI</p>
      </div>
      <div class="tab-bar">
        <button class="tab active" onclick="showTab('browse')">Browse</button>
        <button class="tab" onclick="showTab('chat')">Ask a Question</button>
      </div>
    </header>

    <!-- Browse Panel -->
    <div class="panel active" id="browsePanel">
      <div id="personDetail">
        <div class="empty-state">Select a family member from the sidebar to view their record.</div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="panel" id="chatPanel">
      <div class="chat-wrap">
       
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about the MacPhail family..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Ask</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let PEOPLE = [];
let INDEX = {};
let apiKey = 'AIzaSyANfRAc0WyHMGrW4wgGeS3Cb8Pw1MIgyOA';
let chatHistory = [];

// ── Boot ───────────────────────────────────────────────────
async function boot() {
  const res = await fetch('data/family.json');
  const data = await res.json();
  PEOPLE = data.people;
  PEOPLE.forEach(p => INDEX[p.id] = p);
  renderList(PEOPLE);
  if (apiKey) {
    document.getElementById('apiKeyInput').value = '••••••••••••••••';
    document.getElementById('apiStatus').textContent = 'Key saved';
    document.getElementById('apiStatus').className = 'api-status set';
  }
  initChat();
}

// ── Sidebar list ───────────────────────────────────────────
function renderList(people) {
  const el = document.getElementById('personList');
  el.innerHTML = '';
  people.slice(0, 200).forEach(p => {
    const div = document.createElement('div');
    div.className = 'person-item';
    div.dataset.id = p.id;
    div.innerHTML = `<span class="pid">${p.id}</span>${p.known_as ? p.known_as + ' — ' : ''}${p.name}`;
    div.onclick = () => showPerson(p.id);
    el.appendChild(div);
  });
}

function filterList(q) {
  q = q.toLowerCase();
  const filtered = q
    ? PEOPLE.filter(p =>
        p.name.toLowerCase().includes(q) ||
        (p.known_as && p.known_as.toLowerCase().includes(q)) ||
        p.id.toLowerCase().includes(q))
    : PEOPLE;
  renderList(filtered);
}

// ── Person detail ──────────────────────────────────────────
function showPerson(id) {
  const p = INDEX[id];
  if (!p) return;

  // Highlight sidebar
  document.querySelectorAll('.person-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  showTab('browse');

  const father = p.father ? INDEX[p.father] : null;
  const children = (p.children || []).map(cid => INDEX[cid]).filter(Boolean);
  const siblings = father
    ? (father.children || []).map(cid => INDEX[cid]).filter(c => c && c.id !== id)
    : [];

  let html = `<div class="person-card">`;
  html += `<h2>${p.known_as ? p.known_as + ' ' : ''}${p.name}</h2>`;
  html += `<div class="mp-id">${p.id}</div>`;

  html += `<div class="info-grid">`;
  if (p.born) html += `<span class="label">Born</span><span>${p.born}${p.birthplace ? ' — ' + p.birthplace : ''}</span>`;
  if (p.died) html += `<span class="label">Died</span><span>${p.died}${p.deathplace ? ' — ' + p.deathplace : ''}</span>`;
  if (p.buried) html += `<span class="label">Buried</span><span>${p.buried}</span>`;
  if (p.occupation) html += `<span class="label">Occupation</span><span>${p.occupation}</span>`;
  if (p.residence) html += `<span class="label">Residence</span><span>${p.residence}</span>`;
  html += `</div>`;

  // Parents
  if (father || p.father_name) {
    html += `<div class="section-title">Parents</div><div class="relation-list">`;
    if (father) html += `<span class="relation-link" onclick="showPerson('${father.id}')">${father.name} (${father.id})</span>`;
    else if (p.father_name) html += `<span>${p.father_name}</span>`;
    if (p.mother_name) html += `<span>${p.mother_name}</span>`;
    html += `</div>`;
  }

  // Spouses
  if (p.spouses && p.spouses.length) {
    html += `<div class="section-title">Spouse${p.spouses.length > 1 ? 's' : ''}</div><div class="relation-list">`;
    p.spouses.forEach(s => {
      if (s.id && INDEX[s.id]) {
        html += `<span class="relation-link" onclick="showPerson('${s.id}')">${s.name}${s.married ? ' — married ' + s.married : ''}</span>`;
      } else {
        html += `<span style="font-size:0.84rem">${s.name}${s.married ? ' — married ' + s.married : ''}${s.notes ? ' · ' + s.notes : ''}</span>`;
      }
    });
    html += `</div>`;
  }

  // Children
  if (children.length) {
    html += `<div class="section-title">Children (${children.length})</div><div class="relation-list">`;
    children.forEach(c => {
      html += `<span class="relation-link" onclick="showPerson('${c.id}')">${c.name}${c.born ? ' (b. ' + c.born + ')' : ''}</span>`;
    });
    html += `</div>`;
  }

  // Siblings
  if (siblings.length) {
    html += `<div class="section-title">Siblings (${siblings.length})</div><div class="relation-list">`;
    siblings.forEach(s => {
      html += `<span class="relation-link" onclick="showPerson('${s.id}')">${s.name}${s.born ? ' (b. ' + s.born + ')' : ''}</span>`;
    });
    html += `</div>`;
  }

  // Notes
  if (p.notes) {
    html += `<div class="section-title">Notes</div><div class="notes-box">${p.notes}</div>`;
  }

  html += `</div>`;

  document.getElementById('personDetail').innerHTML = html;
}

// ── Tabs ───────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && name === 'browse') || (i === 1 && name === 'chat'));
  });
  document.getElementById('browsePanel').classList.toggle('active', name === 'browse');
  document.getElementById('chatPanel').classList.toggle('active', name === 'chat');
}


// ── Chat ───────────────────────────────────────────────────
function initChat() {
  addBotMessage(
    'Welcome to the MacPhail family records. I have data on Granger MacPhail (MP114154), Christy MacEachern, and their descendants across Argyle Shore, PEI and beyond.',
    ['Who was Granger MacPhail?', "Who were Jack's children?", 'Tell me about Cecil and Beverly', 'Who is Leslie MacPhail?', 'What happened to Sadie?']
  );
}

function addBotMessage(text, suggestions) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="avatar bot">MP</div>
    <div class="bubble bot">
      ${text.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('')}
      ${suggestions ? `<div class="suggestions">${suggestions.map(s=>`<button class="sug-btn" onclick="sendMessage('${s.replace(/'/g,"\\\'")}')">${s}</button>`).join('')}</div>` : ''}
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user">You</div><div class="bubble user"><p>${text}</p></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'thinking';
  div.innerHTML = `<div class="avatar bot">MP</div><div class="bubble bot"><div class="thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage(text) {
  const input = document.getElementById('chatInput');
  const userText = text || input.value.trim();
  if (!userText) return;

  if (!apiKey) {
    addBotMessage('Please paste your Gemini API key above first. Get one free at aistudio.google.com');
    return;
  }

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addUserMessage(userText);
  chatHistory.push({ role: 'user', parts: [{ text: userText }] });
  showThinking();

  // Build system context from JSON data
function buildContext(people) {
  const index = {};
  people.forEach(p => index[p.id] = p);
  return people.map(p => {
    const parts = [`${p.id}: ${p.name}${p.known_as ? ' ('+p.known_as+')' : ''}`];
    if (p.born) parts.push(`b.${p.born}`);
    if (p.died) parts.push(`d.${p.died}`);
    if (p.father && index[p.father]) parts.push(`father:${index[p.father].name}(${p.father})`);
    if (p.father_name) parts.push(`father:${p.father_name}`);
    if (p.spouses && p.spouses.length) parts.push(`spouse:${p.spouses.map(s=>s.name+(s.married?' m.'+s.married:'')).join('; ')}`);
    if (p.children && p.children.length) parts.push(`children:[${p.children.join(',')}]`);
    if (p.occupation) parts.push(`occ:${p.occupation}`);
    if (p.notes) parts.push(`notes:${p.notes.slice(0,120)}`);
    return parts.join(' | ');
  }).join('\n');
}

const context = `You are a genealogy assistant for the MacPhail family history book Chapter 10, covering GRANGER MacPHAIL (MP114154) and CHRISTY MacEachern of Argyle Shore PEI and all their descendants.
Rules: Be warm and personal. Trace parent/child ID links carefully to work out cousins, siblings, aunts, uncles. First cousins share a grandparent. Show your reasoning step by step. If data is missing say so.

FAMILY DATA (one person per line):
${buildContext(PEOPLE)}`;

  try {
    const payload = {
      system_instruction: { parts: [{ text: context }] },
      contents: chatHistory,
      generationConfig: { maxOutputTokens: 2048, temperature: 0.3 }
    };

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
    );

    const data = await res.json();
    document.getElementById('thinking')?.remove();

    if (!res.ok) {
      const errMsg = data?.error?.message || 'Unknown error';
      addBotMessage(`API error (${res.status}): ${errMsg}`);
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received.';
    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    addBotMessage(reply);

  } catch (err) {
    document.getElementById('thinking')?.remove();
    addBotMessage(`Connection error: ${err.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
}

boot();
</script>
</body>
</html>

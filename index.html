<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacPhail Family Genealogy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap');
  :root { --cream:#f5f0e8; --parchment:#ede5d0; --ink:#2c1f0e; --brown:#6b4a2a; --gold:#b8860b; --rust:#8b3a1a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'Source Serif 4',Georgia,serif; color:var(--ink); min-height:100vh; }
  .layout { display:flex; min-height:100vh; }
  .sidebar { width:280px; flex-shrink:0; background:var(--ink); color:var(--cream); display:flex; flex-direction:column; padding:1.5rem 1rem; gap:1rem; }
  .sidebar h2 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--gold); padding-bottom:0.5rem; border-bottom:1px solid rgba(184,134,11,0.3); }
  .search-box { width:100%; padding:0.5rem 0.75rem; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:3px; color:var(--cream); font-family:'Source Serif 4',serif; font-size:0.82rem; outline:none; }
  .search-box::placeholder { color:rgba(245,240,232,0.4); }
  .search-box:focus { border-color:var(--gold); }
  .person-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
  .person-item { padding:0.45rem 0.6rem; border-radius:3px; cursor:pointer; font-size:0.8rem; line-height:1.3; transition:background 0.15s; border:1px solid transparent; }
  .person-item:hover { background:rgba(184,134,11,0.15); }
  .person-item.active { background:rgba(184,134,11,0.25); border-color:rgba(184,134,11,0.4); }
  .person-item .pid { display:block; font-size:0.68rem; color:var(--gold); opacity:0.8; font-family:monospace; }
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  header { background:white; border-bottom:2px solid var(--gold); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
  .header-title h1 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--ink); }
  .header-title p { font-style:italic; font-size:0.82rem; color:var(--brown); }
  .tab-bar { display:flex; gap:0.25rem; }
  .tab { padding:0.4rem 1rem; border:1px solid var(--parchment); background:var(--parchment); color:var(--brown); font-family:'Source Serif 4',serif; font-size:0.82rem; cursor:pointer; border-radius:3px; transition:all 0.15s; }
  .tab.active, .tab:hover { background:var(--brown); color:var(--cream); border-color:var(--brown); }
  .panel { display:none; flex:1; overflow-y:auto; padding:1.5rem; }
  .panel.active { display:block; }
  .person-card { background:white; border:1px solid var(--parchment); border-radius:4px; padding:1.5rem; max-width:720px; box-shadow:0 2px 8px rgba(44,31,14,0.08); }
  .person-card h2 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--ink); margin-bottom:0.2rem; }
  .person-card .mp-id { font-family:monospace; font-size:0.78rem; color:var(--gold); margin-bottom:1rem; }
  .info-grid { display:grid; grid-template-columns:140px 1fr; gap:0.35rem 1rem; margin-bottom:1rem; font-size:0.88rem; }
  .info-grid .label { color:var(--brown); font-weight:600; }
  .section-title { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--brown); border-bottom:1px solid var(--parchment); padding-bottom:0.3rem; margin:1rem 0 0.5rem; }
  .relation-list { display:flex; flex-direction:column; gap:0.3rem; }
  .relation-link { display:inline-block; padding:0.3rem 0.7rem; background:var(--parchment); border:1px solid rgba(107,74,42,0.2); border-radius:3px; color:var(--brown); font-size:0.84rem; cursor:pointer; text-decoration:none; transition:all 0.15s; }
  .relation-link:hover { background:var(--brown); color:var(--cream); }
  .notes-box { background:var(--parchment); border-left:3px solid var(--gold); padding:0.75rem 1rem; font-size:0.84rem; font-style:italic; margin-top:0.5rem; border-radius:0 3px 3px 0; }
  .chat-wrap { max-width:720px; display:flex; flex-direction:column; height:calc(100vh - 120px); }
  .messages { flex:1; overflow-y:auto; background:white; border:1px solid var(--parchment); border-radius:4px; padding:1rem; display:flex; flex-direction:column; gap:0.8rem; }
  .msg { display:flex; gap:0.6rem; }
  .msg.user { flex-direction:row-reverse; }
  .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:700; flex-shrink:0; font-family:'Playfair Display',serif; }
  .avatar.bot { background:var(--brown); color:var(--cream); }
  .avatar.user { background:var(--gold); color:white; }
  .bubble { max-width:78%; padding:0.6rem 0.85rem; border-radius:4px; font-size:0.86rem; line-height:1.65; }
  .bubble.bot { background:var(--parchment); border:1px solid rgba(184,134,11,0.2); }
  .bubble.user { background:var(--brown); color:var(--cream); }
  .bubble p + p { margin-top:0.4rem; }
  .suggestions { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.6rem; }
  .sug-btn { padding:0.25rem 0.6rem; background:white; border:1px solid var(--gold); color:var(--brown); font-family:'Source Serif 4',serif; font-size:0.74rem; border-radius:2px; cursor:pointer; }
  .sug-btn:hover { background:var(--gold); color:white; }
  .input-row { display:flex; gap:0.5rem; margin-top:0.6rem; }
  .chat-input { flex:1; padding:0.6rem 0.85rem; border:1px solid var(--parchment); border-radius:4px; font-family:'Source Serif 4',serif; font-size:0.86rem; color:var(--ink); background:white; outline:none; }
  .chat-input:focus { border-color:var(--gold); }
  .send-btn { padding:0.6rem 1.1rem; background:var(--brown); color:var(--cream); border:none; border-radius:4px; font-family:'Playfair Display',serif; font-size:0.86rem; cursor:pointer; }
  .send-btn:hover { background:var(--rust); }
  .send-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .thinking-dots { display:flex; gap:4px; padding:4px 0; }
  .dot { width:6px; height:6px; background:var(--brown); border-radius:50%; animation:bounce 1.1s infinite; }
  .dot:nth-child(2) { animation-delay:0.18s; }
  .dot:nth-child(3) { animation-delay:0.36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.35} 40%{transform:translateY(-5px);opacity:1} }
  .empty-state { display:flex; align-items:center; justify-content:center; height:100%; color:var(--brown); opacity:0.5; font-style:italic; font-size:0.9rem; text-align:center; padding:2rem; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>Family Members</h2>
    <input class="search-box" id="searchBox" placeholder="Search by name..." oninput="filterList(this.value)">
    <div class="person-list" id="personList"></div>
  </aside>
  <div class="main">
    <header>
      <div class="header-title">
        <h1>MacPhail Family Genealogy</h1>
        <p>Granger MacPhail (MP114154) &amp; Christy MacEachern · Argyle Shore, PEI</p>
      </div>
      <div class="tab-bar">
        <button class="tab active" onclick="showTab('browse')">Browse</button>
        <button class="tab" onclick="showTab('chat')">Ask a Question</button>
      </div>
    </header>
    <div class="panel active" id="browsePanel">
      <div id="personDetail"><div class="empty-state">Select a family member from the sidebar to view their record.</div></div>
    </div>
    <div class="panel" id="chatPanel">
      <div class="chat-wrap">
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about the MacPhail family..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">Ask</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var PEOPLE = [];
var INDEX = {};
var chatHistory = [];
var WORKER_URL = 'https://quiet-math-cd1dmacphail-gemini.dfbowers.workers.dev';;

async function boot() {
  var res = await fetch('data/family.json');
  var data = await res.json();
  PEOPLE = data.people;
  PEOPLE.forEach(function(p) { INDEX[p.id] = p; });
  renderList(PEOPLE);
  initChat();
}

function renderList(people) {
  var el = document.getElementById('personList');
  el.innerHTML = '';
  people.slice(0,200).forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'person-item';
    div.dataset.id = p.id;
    div.innerHTML = '<span class="pid">'+p.id+'</span>'+(p.known_as ? p.known_as+' — ' : '')+p.name;
    div.onclick = function() { showPerson(p.id); };
    el.appendChild(div);
  });
}

function filterList(q) {
  q = q.toLowerCase();
  var filtered = q ? PEOPLE.filter(function(p) {
    return p.name.toLowerCase().includes(q) || (p.known_as && p.known_as.toLowerCase().includes(q)) || p.id.toLowerCase().includes(q);
  }) : PEOPLE;
  renderList(filtered);
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i===0 && name==='browse') || (i===1 && name==='chat'));
  });
  document.getElementById('browsePanel').classList.toggle('active', name==='browse');
  document.getElementById('chatPanel').classList.toggle('active', name==='chat');
}

function showPerson(id) {
  var p = INDEX[id];
  if (!p) return;
  document.querySelectorAll('.person-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });
  showTab('browse');
  var father = p.father ? INDEX[p.father] : null;
  var children = (p.children || []).map(function(cid) { return INDEX[cid]; }).filter(Boolean);
  var siblings = father ? (father.children || []).map(function(cid) { return INDEX[cid]; }).filter(function(c) { return c && c.id !== id; }) : [];
  var html = '<div class="person-card">';
  html += '<h2>'+(p.known_as ? p.known_as+' ' : '')+p.name+'</h2>';
  html += '<div class="mp-id">'+p.id+'</div>';
  html += '<div class="info-grid">';
  if (p.born) html += '<span class="label">Born</span><span>'+p.born+(p.birthplace ? ' — '+p.birthplace : '')+'</span>';
  if (p.died) html += '<span class="label">Died</span><span>'+p.died+(p.deathplace ? ' — '+p.deathplace : '')+'</span>';
  if (p.buried) html += '<span class="label">Buried</span><span>'+p.buried+'</span>';
  if (p.occupation) html += '<span class="label">Occupation</span><span>'+p.occupation+'</span>';
  if (p.residence) html += '<span class="label">Residence</span><span>'+p.residence+'</span>';
  html += '</div>';
  if (father || p.father_name) {
    html += '<div class="section-title">Parents</div><div class="relation-list">';
    if (father) html += '<span class="relation-link" onclick="showPerson(\''+father.id+'\')">'+father.name+' ('+father.id+')</span>';
    else if (p.father_name) html += '<span>'+p.father_name+'</span>';
    if (p.mother_name) html += '<span>'+p.mother_name+'</span>';
    html += '</div>';
  }
  if (p.spouses && p.spouses.length) {
    html += '<div class="section-title">Spouse'+(p.spouses.length>1?'s':'')+'</div><div class="relation-list">';
    p.spouses.forEach(function(s) {
      if (s.id && INDEX[s.id]) {
        html += '<span class="relation-link" onclick="showPerson(\''+s.id+'\')">'+s.name+(s.married?' — married '+s.married:'')+'</span>';
      } else {
        html += '<span style="font-size:0.84rem">'+s.name+(s.married?' — married '+s.married:'')+'</span>';
      }
    });
    html += '</div>';
  }
  if (children.length) {
    html += '<div class="section-title">Children ('+children.length+')</div><div class="relation-list">';
    children.forEach(function(c) {
      html += '<span class="relation-link" onclick="showPerson(\''+c.id+'\')">'+c.name+(c.born?' (b. '+c.born+')':'')+'</span>';
    });
    html += '</div>';
  }
  if (siblings.length) {
    html += '<div class="section-title">Siblings ('+siblings.length+')</div><div class="relation-list">';
    siblings.forEach(function(s) {
      html += '<span class="relation-link" onclick="showPerson(\''+s.id+'\')">'+s.name+(s.born?' (b. '+s.born+')':'')+'</span>';
    });
    html += '</div>';
  }
  if (p.notes) html += '<div class="section-title">Notes</div><div class="notes-box">'+p.notes+'</div>';
  html += '</div>';
  document.getElementById('personDetail').innerHTML = html;
}

function buildContext(people) {
  var idx = {};
  people.forEach(function(p) { idx[p.id] = p; });
  return people.map(function(p) {
    var father = p.father && idx[p.father] ? idx[p.father].name : (p.father_name || '');
    var kids = (p.children || []).join(',');
    var spouse = p.spouses ? p.spouses.map(function(s) { return s.name; }).join(';') : '';
    var aka = p.known_as ? '('+p.known_as+')' : '';
    return [
      p.id,
      p.name+aka,
      p.born ? 'b'+p.born.slice(0,4) : '',
      p.died ? 'd'+p.died.slice(0,4) : '',
      father ? 'f:'+father : '',
      spouse ? 's:'+spouse : '',
      kids ? 'c:['+kids+']' : ''
    ].filter(Boolean).join('|');
  }).join('\n');
}

function initChat() {
  addBotMessage(
    'Welcome to the MacPhail family records. I have data on Granger MacPhail (MP114154), Christy MacEachern, and all their descendants across Argyle Shore, PEI and beyond. Tell me your name and who you are descended from and I can answer questions about your family connections.',
    ['Who was Granger MacPhail?','Who were Jack and Rotha\'s children?','Tell me about the Mitchell family','Who is Leslie MacPhail?','What happened to Sadie?']
  );
}

function addBotMessage(text, suggestions) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  var bubbleHTML = text.split('\n').filter(function(l){return l.trim();}).map(function(l){return '<p>'+l+'</p>';}).join('');
  if (suggestions) {
    bubbleHTML += '<div class="suggestions">'+suggestions.map(function(s){
      return '<button class="sug-btn" onclick="sendMessage(\''+s.replace(/'/g,"\\'")+'\')">' + s + '</button>';
    }).join('')+'</div>';
  }
  div.innerHTML = '<div class="avatar bot">MP</div><div class="bubble bot">'+bubbleHTML+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar user">You</div><div class="bubble user"><p>'+text+'</p></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg';
  div.id = 'thinking';
  div.innerHTML = '<div class="avatar bot">MP</div><div class="bubble bot"><div class="thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage(text) {
  var input = document.getElementById('chatInput');
  var userText = text || input.value.trim();
  if (!userText) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addUserMessage(userText);
  chatHistory.push({ role:'user', parts:[{ text:userText }] });
  showThinking();

  var context = 'You are a genealogy assistant for the MacPhail family history book Chapter 10, covering GRANGER MacPHAIL (MP114154) and CHRISTY MacEachern of Argyle Shore PEI and all their descendants.\n\nRules:\n- Be warm and personal\n- Trace parent/child ID links carefully to work out cousins, siblings, aunts, uncles\n- First cousins share a grandparent — find the common grandparent then list all children of each of their children\n- Show your reasoning step by step\n- Always complete your full answer before stopping\n- If data is missing say so\n\nFAMILY DATA (one person per line: ID|name|born|died|father|spouse|children):\n' + buildContext(PEOPLE);

  var payload = {
    system_instruction: { parts:[{ text:context }] },
    contents: chatHistory,
    generationConfig: { maxOutputTokens:2048, temperature:0.3 }
  };

  fetch(WORKER_URL, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify(payload)
  }).then(function(res) {
    return res.json().then(function(data) {
      var thinkEl = document.getElementById('thinking');
      if (thinkEl) thinkEl.remove();
      if (!res.ok) {
        addBotMessage('API error ('+res.status+'): '+(data && data.error && data.error.message ? data.error.message : JSON.stringify(data)));
        document.getElementById('sendBtn').disabled = false;
        return;
      }
      var reply = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) ? data.candidates[0].content.parts[0].text : 'No response received.';
      chatHistory.push({ role:'model', parts:[{ text:reply }] });
      addBotMessage(reply);
      document.getElementById('sendBtn').disabled = false;
    });
  }).catch(function(err) {
    var thinkEl = document.getElementById('thinking');
    if (thinkEl) thinkEl.remove();
    addBotMessage('Connection error: '+err.message);
    document.getElementById('sendBtn').disabled = false;
  });
}

boot();
</script>
</body>
</html>
